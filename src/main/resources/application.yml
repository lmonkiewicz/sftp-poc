spring:
  application:
    name: sftp-poc
  main:
    web-application-type: none

# ─── Multi-user file transfer configuration (FTP + SFTP) ────────────────────
sftp:
  polling-interval: 30s
  users:
    # ── SFTP users ──
    - id: user1
      protocol: SFTP
      host: sftp.example.com
      port: 22
      username: user1
      private-key-path: classpath:keys/user1_id_rsa
      # private-key-passphrase: optional-passphrase
      home-dir: "16000002/"
      input-dir: "input"
      output-dir: "output"
      allow-unknown-keys: true

    - id: user2
      protocol: SFTP
      host: sftp2.example.com
      port: 22
      username: user2
      password: secret-password
      home-dir: "16000003/"
      input-dir: "input"
      output-dir: "output"
      allow-unknown-keys: true

    # ── FTP users ──
    - id: user3
      protocol: FTP
      host: ftp.example.com
      port: 21
      username: ftpuser
      password: ftp-password
      home-dir: "16000004/"
      input-dir: "input"
      output-dir: "output"
      passive-mode: true

logging:
  level:
    dev.effective.sftppoc: DEBUG
    org.springframework.integration: INFO
